version: '3.8'

services:
  meshpi-host:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshpi-host
    ports:
      - "7422:7422"
    volumes:
      - meshpi-config:/app/config
      - meshpi-data:/app/data
    environment:
      - MESHPI_PORT=7422
      - MESHPI_BIND=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7422/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - meshpi-net

  # Simulated client for E2E testing
  meshpi-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: meshpi-client
    depends_on:
      meshpi-host:
        condition: service_healthy
    environment:
      - MESHPI_HOST_IP=meshpi-host
      - MESHPI_HOST_PORT=7422
      - DEVICE_ID=rpi-test-001
    networks:
      - meshpi-net

  # Prometheus for metrics scraping
  prometheus:
    image: prom/prometheus:latest
    container_name: meshpi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - meshpi-net
    profiles:
      - monitoring

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: meshpi-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=meshpi
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - meshpi-net
    profiles:
      - monitoring

volumes:
  meshpi-config:
  meshpi-data:
  prometheus-data:
  grafana-data:

networks:
  meshpi-net:
    driver: bridge