name: MeshPi CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (fast, no Docker) ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" websockets

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/integration \
            -v --tb=short \
            --junitxml=test-results/unit-${{ matrix.python-version }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: test-results/

  # ── Docker build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build host image
        run: docker build -t meshpi-host:ci -f docker/host/Dockerfile .

      - name: Build client image
        run: docker build -t meshpi-client:ci -f docker/client/Dockerfile .

      - name: Build test image
        run: docker build -t meshpi-test:ci -f docker/test-env/Dockerfile .

  # ── Tests in Docker ───────────────────────────────────────────────────────
  docker-tests:
    name: Unit Tests in Docker
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          docker compose --profile test build meshpi-test
          docker compose --profile test run --rm meshpi-test \
            python -m pytest tests/ \
              --ignore=tests/integration \
              -v --tb=short

  # ── Integration tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start host service
        run: |
          docker compose up -d meshpi-host
          echo "Waiting for host to be healthy..."
          timeout 60 bash -c 'until docker compose ps meshpi-host | grep -q "healthy"; do sleep 2; done'

      - name: Run integration tests
        run: |
          docker compose --profile integration run --rm meshpi-integration \
            python -m pytest tests/integration/ -v --tb=short
        env:
          MESHPI_HOST_IP: meshpi-host
          MESHPI_HOST_PORT: "7422"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs meshpi-host

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ── Wheel build ───────────────────────────────────────────────────────────
  build-wheel:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: meshpi-wheel
          path: dist/*.whl

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check meshpi/ --ignore E501,F401
