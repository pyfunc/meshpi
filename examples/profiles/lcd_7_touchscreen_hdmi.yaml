# 🖥️ 7" Touchscreen LCD Display
- 7" LCD touchscreen with HDMI interface and capacitive touch
# Perfect for Raspberry Pi tablets, dashboards, and interactive displays

id: "lcd_7_touchscreen_hdmi"
name: "7\" HDMI Touchscreen Display"
category: "display"
description: "7\" LCD display with HDMI interface, capacitive touchscreen, and X11 driver support for interactive projects"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "python3-numpy"
  - "python3-pil"
  - "xserver-xorg"
  - "xserver-xorg-video-fbdev"
  - "xinput"
  - "x11-xserver-utils"
  - "xcalib"
  - "libinput-tools"

# Kernel modules to load
kernel_modules: []

# Device tree overlays
overlays: []

# /boot/config.txt modifications
config_txt_lines:
  - "hdmi_force_hotplug=1"
  - "hdmi_drive=1"
  - "hdmi_group=2"
  - "hdmi_mode=87"
  - "hdmi_cvt=1024 600 60 6 0 0 0"
  - "max_framebuffer_height=1024"
  - "max_framebuffer_width=2048"
  - "gpu_mem=256"

# Post-installation commands
post_commands:
  - "pip3 install pygame"
  - "pip3 install pillow"
  - "pip3 install numpy"
  - "pip3 install matplotlib"
  - "pip3 install opencv-python"
  - "pip3 install kivy"
  - "echo 'export DISPLAY=:0' >> ~/.bashrc"
  - "xinput_calibrator --list 2>/dev/null || echo 'Touchscreen calibration available'"
  - "usermod -a -G video,input $USER"
  - "echo '7\" HDMI Touchscreen Display setup complete!'"

# Tags for searching
tags:
  - "display"
  - "lcd"
  - "touchscreen"
  - "hdmi"
  - "capacitive"
  - "dashboard"
  - "interactive"
  - "tablet"
  - "large-display"
