# 🎵 I2S Audio DAC
- PCM5102 I2S Digital-to-Analog Converter for high-quality audio output
# Perfect for music players, audio streaming, and high-fidelity sound projects

id: "i2s_pcm5102_audio_dac"
name: "I2S PCM5102 Audio DAC"
category: "audio"
description: "I2S PCM5102 Digital-to-Analog Converter with high-quality audio output, ALSA configuration, and audio libraries"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "alsa-utils"
  - "libasound2-dev"
  - "python3-pyaudio"

# Kernel modules to load
kernel_modules:
  - "snd-bcm2835"
  - "snd-soc-pcm5102a"
  - "snd-soc-hifiberry-dac"

# Device tree overlays
overlays:
  - "i2s-mmap"
  - "hifiberry-dac"

# /boot/config.txt modifications
config_txt_lines:
  - "dtparam=audio=on"
  - "dtparam=i2s=on"
  - "dtoverlay=hifiberry-dac"

# Post-installation commands
post_commands:
  - "pip3 install pyaudio"
  - "pip3 install sounddevice"
  - "pip3 install numpy"
  - "pip3 install matplotlib"
  - "amixer cset numid=3 1>/dev/null 2>&1 || echo 'Audio mixer setup'"
  - "alsactl init 2>/dev/null || echo 'ALSA initialized'"
  - "usermod -a -G audio $USER"
  - "echo 'I2S Audio DAC setup complete!'"

# Tags for searching
tags:
  - "i2s"
  - "audio"
  - "dac"
  - "pcm5102"
  - "hifiberry"
  - "music"
  - "sound"
  - "high-quality"
