# 🎩 Pimoroni Explorer HAT
# Pimoroni Explorer HAT with motor drivers, ADC, and input/output expansion
# Perfect for robotics, automation, and expansion projects

id: "pimoroni_explorer_hat"
name: "Pimoroni Explorer HAT"
category: "hat"
description: "Pimoroni Explorer HAT with motor drivers, analog inputs, digital I/O, and expansion capabilities"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "python3-smbus"
  - "i2c-tools"
  - "python3-numpy"

# Kernel modules to load
kernel_modules:
  - "i2c-dev"
  - "i2c-bcm2708"

# Device tree overlays
overlays:
  - "i2c-arm"

# /boot/config.txt modifications
config_txt_lines:
  - "dtparam=i2c_arm=on"
  - "dtparam=i2c_arm_baudrate=400000"

# Post-installation commands
post_commands:
  - "pip3 install explorerhat"
  - "pip3 install numpy"
  - "pip3 install matplotlib"
  - "pip3 install scipy"
  - "i2cdetect -y 1"
  - "usermod -a -G i2c,gpio $USER"
  - "echo 'Pimoroni Explorer HAT setup complete!'"

# Tags for searching
tags:
  - "hat"
  - "pimoroni"
  - "motor"
  - "adc"
  - "expansion"
  - "robotics"
  - "automation"
  - "i2c"
