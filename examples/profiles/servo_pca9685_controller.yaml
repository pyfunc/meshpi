# 🚗 Servo Motor Controller
# PCA9685 16-channel PWM servo controller with precise position control
# Ideal for robotics, camera gimbals, animatronics, and multi-servo projects

id: "servo_pca9685_controller"
name: "PCA9685 Servo Motor Controller"
category: "motor"
description: "16-channel PCA9685 PWM servo controller with I2C interface, precise positioning, and smooth motion control"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "python3-smbus"
  - "i2c-tools"

# Kernel modules to load
kernel_modules:
  - "i2c-dev"
  - "i2c-bcm2708"

# Device tree overlays
overlays:
  - "i2c-arm"

# /boot/config.txt modifications
config_txt_lines:
  - "dtparam=i2c_arm=on"
  - "dtparam=i2c_arm_baudrate=400000"

# Post-installation commands
post_commands:
  - "pip3 install adafruit-circuitpython-pca9685"
  - "pip3 install adafruit-circuitpython-servokit"
  - "pip3 install numpy"
  - "pip3 install matplotlib"
  - "i2cdetect -y 1"
  - "usermod -a -G i2c,gpio $USER"
  - "echo 'PCA9685 Servo Controller setup complete!'"

# Tags for searching
tags:
  - "motor"
  - "servo"
  - "pca9685"
  - "pwm"
  - "i2c"
  - "robotics"
  - "positioning"
  - "multi-channel"
