# 🌐 LoRa Wireless Communication
# SX1276/SX1278 LoRa module for long-range wireless communication and IoT networking
# Ideal for remote sensors, IoT mesh networks, and long-distance data transmission

id: "lora_sx1276_wireless"
name: "LoRa SX1276 Wireless Module"
category: "networking"
description: "LoRa SX1276/SX1278 wireless communication module with SPI interface, Python libraries, and mesh networking"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "python3-spidev"
  - "python3-serial"
  - "git"

# Kernel modules to load
kernel_modules:
  - "spi-bcm2835"
  - "spidev"

# Device tree overlays
overlays:
  - "spi0-cs"

# /boot/config.txt modifications
config_txt_lines:
  - "dtparam=spi=on"
  - "dtparam=spi-cs-high"
  - "dtoverlay=spi0-cs"

# Post-installation commands
post_commands:
  - "pip3 install spidev"
  - "pip3 install pyserial"
  - "pip3 install adafruit-circuitpython-rlm4200"
  - "git clone https://github.com/micropython/micropython-lib.git /tmp/micropython-lib"
  - "cd /tmp/micropython-lib && python3 -m pip install -e . && cd - && rm -rf /tmp/micropython-lib"
  - "usermod -a -G spi,gpio $USER"
  - "echo 'LoRa wireless module setup complete!'"

# Tags for searching
tags:
  - "spi"
  - "lora"
  - "wireless"
  - "iot"
  - "long-range"
  - "sx1276"
  - "sx1278"
  - "mesh-network"
