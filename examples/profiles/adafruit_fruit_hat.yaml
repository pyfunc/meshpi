# 🎩 Adafruit Fruit HAT
# Adafruit Fruit HAT with multiple sensors, LED matrix, and capacitive touch
- All-in-one sensor board with environmental monitoring and interactive display

id: "adafruit_fruit_hat"
name: "Adafruit Fruit HAT"
category: "hat"
description: "Adafruit Fruit HAT with temperature, humidity, pressure sensors, LED matrix display, and capacitive touch buttons"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "python3-smbus"
  - "i2c-tools"
  - "python3-numpy"

# Kernel modules to load
kernel_modules:
  - "i2c-dev"
  - "i2c-bcm2708"

# Device tree overlays
overlays:
  - "i2c-arm"

# /boot/config.txt modifications
config_txt_lines:
  - "dtparam=i2c_arm=on"
  - "dtparam=i2c_arm_baudrate=400000"

# Post-installation commands
post_commands:
  - "pip3 install adafruit-circuitpython-bme280"
  - "pip3 install adafruit-circuitpython-matrix"
  - "pip3 install adafruit-circuitpython-ht16k33"
  - "pip3 install adafruit-circuitpython-mpr121"
  - "pip3 install numpy"
  - "pip3 install matplotlib"
  - "pip3 install pillow"
  - "i2cdetect -y 1"
  - "usermod -a -G i2c,gpio $USER"
  - "echo 'Adafruit Fruit HAT setup complete!'"

# Tags for searching
tags:
  - "hat"
  - "adafruit"
  - "sensor"
  - "led-matrix"
  - "capacitive-touch"
  - "i2c"
  - "environmental"
  - "interactive"
