# 🌐 Waveshare 4.3" LCD Display
# Waveshare 4.3" LCD touchscreen display with SPI interface and touch support
# Perfect for Raspberry Pi dashboards, control panels, and interactive projects

id: "waveshare_lcd_43_touchscreen"
name: "Waveshare 4.3\" LCD Touchscreen"
category: "display"
description: "Waveshare 4.3\" LCD display with SPI interface, touchscreen support, and X11 driver integration"

# System packages required
packages:
  - "python3-pip"
  - "python3-dev"
  - "python3-numpy"
  - "python3-pil"
  - "xserver-xorg"
  - "xserver-xorg-video-fbdev"
  - "xinput"
  - "x11-xserver-utils"

# Kernel modules to load
kernel_modules:
  - "fbtft_device"
  - "fbtft"

# Device tree overlays
overlays:
  - "spi0-cs"
  - "waveshare43"

# /boot/config.txt modifications
config_txt_lines:
  - "dtparam=spi=on"
  - "dtoverlay=waveshare43"
  - "dtoverlay=spi0-cs"
  - "framebuffer_width=480"
  - "framebuffer_height=272"
  - "framebuffer_depth=32"
  - "framebuffer_ignore_alpha=1"

# Post-installation commands
post_commands:
  - "pip3 install pygame"
  - "pip3 install pillow"
  - "pip3 install numpy"
  - "pip3 install matplotlib"
  - "pip3 install opencv-python"
  - "echo 'export FRAMEBUFFER=/dev/fb1' >> ~/.bashrc"
  - "echo 'export DISPLAY=:0' >> ~/.bashrc"
  - "usermod -a -G spi,gpio,video,input $USER"
  - "echo 'Waveshare 4.3\" LCD Touchscreen setup complete!'"

# Tags for searching
tags:
  - "display"
  - "lcd"
  - "touchscreen"
  - "spi"
  - "waveshare"
  - "dashboard"
  - "interactive"
  - "control-panel"
